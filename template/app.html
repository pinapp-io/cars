<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Car</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f4f4f6;
      --card: #fff;
      --border: #e5e5ea;
      --text: #1a1a1a;
      --muted: #6b6b73;
      --accent: #1a1a1a;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      padding: 0 0 5rem;
    }
    .header {
      background: var(--card);
      padding: 1.5rem 1.25rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .title { font-size: 1.5rem; font-weight: 700; line-height: 1.15; }
    .subtitle {
      color: var(--muted); font-size: 0.92rem;
      margin-top: 0.25rem; display: flex; gap: 0.6rem; flex-wrap: wrap;
    }
    .subtitle span:not(:last-child)::after {
      content: '·'; margin-left: 0.6rem; color: #c8c8cc;
    }
    .vin {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.78rem; color: #999;
      margin-top: 0.5rem; letter-spacing: 0.02em;
    }

    .quickbar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem; padding: 1rem 1.25rem;
    }
    .quick {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.85rem 0.5rem;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.35rem; cursor: pointer; font-size: 0.78rem;
      color: var(--text); transition: transform 0.08s;
    }
    .quick:active { transform: scale(0.96); }
    .quick .icon { font-size: 1.5rem; }

    .section {
      padding: 0.5rem 1.25rem 1rem;
    }
    .section-title {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin: 1rem 0 0.5rem;
    }
    .events {
      background: var(--card); border-radius: 12px;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .event {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 0.85rem; align-items: flex-start;
    }
    .event:last-child { border-bottom: none; }
    .event-icon {
      flex-shrink: 0; font-size: 1.25rem;
      width: 36px; height: 36px;
      background: #f0f0f3; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .event-body { flex: 1; min-width: 0; }
    .event-title { font-weight: 600; font-size: 0.95rem; }
    .event-note {
      color: var(--muted); font-size: 0.88rem;
      margin-top: 0.15rem; word-break: break-word;
    }
    .event-meta {
      color: #999; font-size: 0.78rem;
      margin-top: 0.35rem;
    }
    .event-photo {
      margin-top: 0.5rem; max-width: 100%;
      border-radius: 8px; max-height: 200px;
    }
    .empty {
      padding: 2.5rem 1rem; text-align: center;
      color: var(--muted); font-size: 0.92rem;
    }

    .qr-section {
      padding: 1rem 1.25rem;
      text-align: center;
    }
    /* <pinapp-qr> ships its own styles from @pinapp-io/harness; only theme
       it via the CSS custom properties it exposes. */
    pinapp-qr {
      --pinapp-qr-size: 220px;
      --pinapp-qr-shadow: var(--shadow);
    }
    .qr-actions {
      display: flex; gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .qr-btn {
      padding: 0.55rem 1.1rem;
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
    }
    .qr-btn:hover { background: #f0f0f3; }

    /* Modal */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: var(--card); width: 100%; max-width: 480px;
      border-radius: 16px 16px 0 0; padding: 1.25rem;
      max-height: 88vh; overflow-y: auto;
    }
    @media (min-width: 520px) {
      .modal { align-items: center; padding: 1rem; }
      .modal-content { border-radius: 16px; }
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .modal-header h3 { font-size: 1.1rem; }
    .close {
      background: none; border: none; font-size: 1.5rem;
      cursor: pointer; color: var(--muted); padding: 0 0.25rem;
    }
    .field { margin-bottom: 0.85rem; }
    .field label {
      display: block; margin-bottom: 0.3rem;
      font-size: 0.85rem; font-weight: 500;
    }
    .field input, .field textarea {
      width: 100%; padding: 0.65rem 0.8rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 1rem; background: #fafafb;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .submit-btn {
      width: 100%; padding: 0.9rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem;
    }
    .submit-btn:disabled { background: #999; }

    .photo-preview {
      margin-top: 0.5rem;
      width: 80px; height: 80px;
      border-radius: 8px; background: #f0f0f3;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }

    .toast {
      position: fixed; bottom: 1.25rem; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: #fff;
      padding: 0.7rem 1.1rem; border-radius: 10px;
      font-size: 0.92rem; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none; z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title" id="title">Loading...</div>
    <div class="subtitle" id="subtitle"></div>
    <div class="vin" id="vin"></div>
  </div>

  <div class="quickbar" id="quickbar"></div>
  <div class="section">
    <div class="section-title">History</div>
    <div class="events" id="events">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <div class="section qr-section" id="qrSection" style="display:none;">
    <div class="section-title">Tag</div>
    <pinapp-qr id="qrImg"></pinapp-qr>
    <div class="qr-actions">
      <button type="button" class="qr-btn" id="printQrBtn">Print</button>
      <button type="button" class="qr-btn" id="shareQrBtn">Share</button>
    </div>
  </div>

  <div class="modal hidden" id="eventModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Add Event</h3>
        <button class="close" id="closeBtn">&times;</button>
      </div>
      <form id="eventForm">
        <input type="hidden" id="eventType" name="type">
        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="eventTitle" name="title" required>
        </div>
        <div class="field" id="extraFields"></div>
        <div class="field">
          <label for="note">Note</label>
          <textarea id="eventNote" name="note"></textarea>
        </div>
        <div class="field">
          <label>Photo</label>
          <input type="file" id="photoFile" accept="image/*" capture="environment">
          <div class="photo-preview" id="photoPreview" style="display:none;"></div>
          <input type="hidden" id="photoId" name="photoId">
        </div>
        <button type="submit" class="submit-btn" id="eventSubmit">Save</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    const ADDRESS = window.location.pathname.split('/').filter(Boolean).pop();
    const MOUNT = window.location.pathname.replace(/\/[^/]*\/?$/, '');
    const API = `${MOUNT}/api`;
    let templateManifest = null;
    let instance = null;

    // Shared pinapp logo + QR widget. Defines <pinapp-qr> and exports the
    // print/share helpers — all pinapps use the same module.
    const { printPinappQR, sharePinappQR } = await import(`${MOUNT}/harness/pinapp-qr.js`);

    async function api(path, opts = {}) {
      const res = await fetch(`${API}${path}`, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({error: res.statusText}));
        throw new Error(err.error || 'Request failed');
      }
      return res.json();
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
      return d.toLocaleDateString();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function renderHeader() {
      const f = instance.fixedAttributes || {};
      document.getElementById('title').textContent =
        [f.year, f.make, f.model].filter(Boolean).join(' ') || 'Car';

      const subtitleParts = [];
      if (f.color) subtitleParts.push(f.color);
      if (f.plate) subtitleParts.push(f.plate);
      document.getElementById('subtitle').innerHTML =
        subtitleParts.map(p => `<span>${p}</span>`).join('');

      document.getElementById('vin').textContent = f.vin ? `VIN ${f.vin}` : '';
    }

    function renderQuickbar() {
      const types = templateManifest.eventTypes || [];
      document.getElementById('quickbar').innerHTML = types.map(t => `
        <div class="quick" data-type="${t.id}">
          <div class="icon">${t.icon}</div>
          <div>${t.label}</div>
        </div>
      `).join('');
      document.querySelectorAll('.quick').forEach(el => {
        el.addEventListener('click', () => openModal(el.dataset.type));
      });
    }

    function eventIcon(type) {
      const t = (templateManifest.eventTypes || []).find(t => t.id === type);
      return t ? t.icon : '•';
    }

    function renderEvents() {
      const events = (instance.events || []).slice().reverse();
      const container = document.getElementById('events');
      if (events.length === 0) {
        container.innerHTML = '<div class="empty">No events yet. Tap a quick action above.</div>';
        return;
      }
      container.innerHTML = events.map(e => {
        const photo = e.photoId
          ? `<img class="event-photo" src="${API}/image/${e.photoId}" alt="">`
          : '';
        const meta = [
          fmtTime(e.timestamp),
          e.city ? `${e.city}${e.region ? ', ' + e.region : ''}` : null
        ].filter(Boolean).join(' · ');
        const extras = Object.entries(e)
          .filter(([k]) => !['type','title','note','photoId','timestamp','scannedBy',
            'city','region','country','timezone','latitude','longitude','location',
            'weather','weatherDescription','weatherIcon','weatherId','temperature',
            'humidity','barometer','wind_speed','wind_direction','wind_gust',
            'weather_visibility'].includes(k))
          .map(([k,v]) => `<div>${k}: ${v}</div>`).join('');
        return `
          <div class="event">
            <div class="event-icon">${eventIcon(e.type)}</div>
            <div class="event-body">
              <div class="event-title">${e.title || e.type || 'Event'}</div>
              ${e.note ? `<div class="event-note">${e.note}</div>` : ''}
              ${extras ? `<div class="event-note">${extras}</div>` : ''}
              ${photo}
              <div class="event-meta">${meta}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('printQrBtn').addEventListener('click', () => {
      if (!instance?.qrCode) return;
      const title = document.getElementById('title').textContent || 'Pinapp';
      if (!printPinappQR({ qrCode: instance.qrCode, qrUrl: instance.qrUrl, title })) {
        showToast('Pop-up blocked');
      }
    });

    document.getElementById('shareQrBtn').addEventListener('click', async () => {
      if (!instance?.qrUrl) return;
      const ok = await sharePinappQR(instance.qrUrl);
      showToast(ok ? 'Link copied' : 'Could not copy');
    });

    function renderQR() {
      if (!instance.qrCode) return;
      document.getElementById('qrSection').style.display = 'block';
      document.getElementById('qrImg').setAttribute('src', instance.qrCode);
    }

    /* ---------- Event modal ---------- */

    const modal = document.getElementById('eventModal');
    const extraFieldsContainer = document.getElementById('extraFields');

    function extraFieldsFor(type) {
      if (type === 'fuel') {
        return `
          <label>Gallons</label>
          <input type="number" name="gallons" step="0.01" min="0" placeholder="12.3">
          <label style="margin-top:0.5rem;">Price (total $)</label>
          <input type="number" name="price" step="0.01" min="0" placeholder="42.50">
          <label style="margin-top:0.5rem;">Mileage</label>
          <input type="number" name="mileage" min="0" placeholder="84320">
        `;
      }
      if (type === 'service') {
        return `
          <label>Mileage</label>
          <input type="number" name="mileage" min="0" placeholder="84320">
          <label style="margin-top:0.5rem;">Cost ($)</label>
          <input type="number" name="cost" step="0.01" min="0" placeholder="120.00">
        `;
      }
      return '';
    }

    function openModal(type) {
      document.getElementById('eventType').value = type;
      const t = (templateManifest.eventTypes || []).find(t => t.id === type);
      document.getElementById('modalTitle').textContent = `Add ${t ? t.label : 'Event'}`;
      document.getElementById('eventTitle').value = t ? t.label : '';
      extraFieldsContainer.innerHTML = extraFieldsFor(type);
      document.getElementById('eventNote').value = '';
      document.getElementById('photoFile').value = '';
      document.getElementById('photoId').value = '';
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('photoPreview').innerHTML = '';
      modal.classList.remove('hidden');
    }
    function closeModal() { modal.classList.add('hidden'); }
    document.getElementById('closeBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    document.getElementById('photoFile').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      const dataUrl = await new Promise((res, rej) => {
        reader.onload = () => res(reader.result);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      const img = new Image();
      const resized = await new Promise(res => {
        img.onload = () => {
          let w = img.width, h = img.height, max = 1200;
          if (w > max || h > max) {
            if (w > h) { h = Math.round(h*max/w); w = max; }
            else { w = Math.round(w*max/h); h = max; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          res(c.toDataURL('image/png'));
        };
        img.src = dataUrl;
      });
      const preview = document.getElementById('photoPreview');
      preview.style.display = 'flex';
      preview.innerHTML = `<img src="${resized}" alt="">`;
      const base64 = resized.split(',')[1];
      const r = await fetch(`${API}/image`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({data: base64})
      });
      if (r.ok) {
        const {id} = await r.json();
        document.getElementById('photoId').value = id;
      } else {
        showToast('Photo upload failed');
      }
    });

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('eventSubmit');
      btn.disabled = true; btn.textContent = 'Saving...';
      const fd = new FormData(e.target);
      const attrs = {};
      fd.forEach((v, k) => { if (v) attrs[k] = v; });
      try {
        await api(`/instance/${ADDRESS}/event`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({attributes: attrs})
        });
        closeModal();
        showToast('Saved');
        await load();
      } catch (err) {
        showToast(err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Save';
      }
    });

    /* ---------- boot ---------- */
    async function load() {
      try {
        instance = await api(`/instance/${ADDRESS}`);
        if (!templateManifest) {
          templateManifest = await api(`/template`);
          renderQuickbar();
        }
        renderHeader();
        renderEvents();
        renderQR();
      } catch (err) {
        document.getElementById('title').textContent = 'Not Found';
        document.getElementById('events').innerHTML =
          `<div class="empty">${err.message}</div>`;
      }
    }
    load();
  </script>
</body>
</html>
