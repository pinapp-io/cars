<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mint a Car</title>
  <link rel="stylesheet" href="/style/static.css">
  <script src="/script/common.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f6;
      min-height: 100vh;
      padding: 1.5rem;
      color: #1a1a1a;
    }
    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 1.5rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .sub { color: #666; font-size: 0.92rem; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1.1rem; }
    label { display: block; margin-bottom: 0.35rem; font-weight: 500; font-size: 0.92rem; }
    .req { color: #d33; }
    input {
      width: 100%; padding: 0.7rem 0.85rem;
      border: 1px solid #d6d6db; border-radius: 8px;
      font-size: 1rem; background: #fafafb;
    }
    input:focus { outline: 2px solid #4a7eff; background: #fff; }
    .row { display: flex; gap: 0.75rem; }
    .row > .field { flex: 1; }
    button {
      width: 100%; padding: 0.95rem;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem;
    }
    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }
    .hint {
      font-size: 0.82rem; color: #888;
      margin-top: 1rem; text-align: center;
    }
    .hint strong { color: #444; }
    .error {
      background: #fde8e8; color: #a02020;
      padding: 0.75rem 0.9rem; border-radius: 8px;
      margin-bottom: 1rem; font-size: 0.92rem;
      display: none;
    }
  </style>
</head>
<body>
  <header data-widget="header"></header>
  <div class="card">
    <h1>Mint a Car</h1>
    <p class="sub">A persistent record bound to one vehicle. Print the QR sticker, attach it inside the glove box.</p>

    <div class="error" id="error"></div>

    <form id="mintForm">
      <div class="row">
        <div class="field">
          <label for="year">Year <span class="req">*</span></label>
          <input type="number" id="year" name="year" min="1900" max="2100" required placeholder="2014">
        </div>
        <div class="field">
          <label for="make">Make <span class="req">*</span></label>
          <input type="text" id="make" name="make" required placeholder="Honda">
        </div>
      </div>

      <div class="field">
        <label for="model">Model <span class="req">*</span></label>
        <input type="text" id="model" name="model" required placeholder="Fit">
      </div>

      <div class="field">
        <label for="vin">VIN</label>
        <input type="text" id="vin" name="vin" maxlength="17" placeholder="17 chars">
      </div>

      <div class="row">
        <div class="field">
          <label for="color">Color</label>
          <input type="text" id="color" name="color" placeholder="Silver">
        </div>
        <div class="field">
          <label for="plate">Plate</label>
          <input type="text" id="plate" name="plate" placeholder="ABC 1234">
        </div>
      </div>

      <button type="submit" id="submitBtn">Mint Instance</button>
    </form>

    <p class="hint">A <strong>simulated</strong> on-chain mint for now &mdash; real contract deployment lands next.</p>
  </div>

  <script>
    // Mount path = the URL prefix this agent is served from (e.g.
    // /agent/epistery/car). Strip a trailing /mint or trailing slash.
    const MOUNT = window.location.pathname.replace(/\/(mint|index\.html)?\/?$/, '');
    const API = `${MOUNT}/api`;

    const form = document.getElementById('mintForm');
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Minting...';

      const fixedAttributes = {};
      new FormData(form).forEach((v, k) => { if (v) fixedAttributes[k] = v; });

      try {
        const res = await fetch(`${API}/instance`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fixedAttributes })
        });
        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          throw new Error(e.error || 'Mint failed');
        }
        const { instance } = await res.json();
        window.location.href = `${MOUNT}/${instance.address}`;
      } catch (err) {
        errBox.textContent = err.message;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Mint Instance';
      }
    });
  </script>
</body>
</html>
